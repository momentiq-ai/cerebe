name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Cerebe does this relate to?
      options:
        - Memory API
        - Knowledge Graph API
        - Meta-Learning API
        - Agent Tooling
        - LLM / Chat API
        - Python SDK
        - TypeScript SDK
        - Dashboard
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to accomplish? What's missing or difficult today?
      placeholder: "I'm building an agent that needs to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? Code examples welcome.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other approaches you've considered.
    validations:
      required: false
